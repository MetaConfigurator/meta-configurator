# Local Docker deployment of snapshot_sharing (no HTTPS, no reverse proxy).
#
# Useful for running the full stack — Flask app + Mongo + Redis — on a
# developer machine. The Flask app is reachable directly on
# http://localhost:${SNAPSHOT_SHARING_PORT:-5000}.
#
# For the HTTPS variant see docker-compose.https.yml.
# For the multi-service joint deployment see ../docker-compose.yml.
#
# Deploy:
#   docker compose up -d --build
#   curl http://localhost:5000/snapshot/does-not-exist  # 404 → service is up

services:

  snapshot_sharing:
    container_name: snapshot_sharing
    build: .
    ports:
      - "${SNAPSHOT_SHARING_PORT:-5000}:5000"
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    environment:
      FLASK_ENV: development
      FLASK_ENABLE_SSL: "false"
      MONGO_USER: root
      MONGO_PASS: ${MONGO_PASS:-example}
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DB: metaconfigurator
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASS: ${REDIS_PASS:-localdev}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,https://metaconfigurator.github.io,https://logende.github.io,https://www.metaconfigurator.org,https://metaconfigurator.org,https://metaconfigurator.informatik.uni-stuttgart.de}
      # Local dev / e2e tests run many requests in quick succession — disable
      # the per-endpoint rate limiter unless explicitly turned on. The HTTPS
      # production compose leaves this default-on.
      RATELIMIT_ENABLED: ${RATELIMIT_ENABLED:-false}

  mongo:
    image: mongo:latest
    container_name: snapshot_sharing-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-example}
      MONGO_INITDB_DATABASE: metaconfigurator

  redis:
    image: redis:latest
    container_name: snapshot_sharing-redis
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - redis-server --requirepass "$${REDIS_PASS}"
    environment:
      REDIS_PASS: ${REDIS_PASS:-localdev}
    volumes:
      - redis-data:/var/lib/redis/data

volumes:
  mongo-data:
  redis-data:
