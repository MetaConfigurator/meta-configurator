services:

  relay:
    build: .
    container_name: mc-relay
    expose:
      - "8080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped
    networks:
      - relay-network
    environment:
      # Replace these values with your actual domain and email before deploying.
      VIRTUAL_HOST: relay.your-domain.example.com
      VIRTUAL_PORT: 8080
      LETSENCRYPT_HOST: relay.your-domain.example.com
      LETSENCRYPT_EMAIL: your-email@example.com

  nginx-proxy:
    image: jwilder/nginx-proxy
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/nginx/vhost.d
      - acme-challenges:/usr/share/nginx/html
      - ./certs:/etc/nginx/certs
      - /var/run/docker.sock:/tmp/docker.sock:ro
    networks:
      - relay-network
    restart: unless-stopped

  letsencrypt:
    image: jrcs/letsencrypt-nginx-proxy-companion
    container_name: nginx-letsencrypt
    depends_on:
      - nginx-proxy
    environment:
      NGINX_PROXY_CONTAINER: nginx-proxy
      DEFAULT_EMAIL: your-email@example.com
    volumes:
      - ./certs:/etc/nginx/certs
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/nginx/vhost.d
      - acme-challenges:/usr/share/nginx/html
    networks:
      - relay-network
    restart: unless-stopped

networks:
  relay-network:
    driver: bridge

volumes:
  acme-challenges:
