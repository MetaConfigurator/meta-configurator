<?xml version="1.0" encoding="UTF-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
<rect width="1200" height="630" fill="#ffffff"/>
<svg x="110" y="165" width="300" height="300" viewBox="0 0 512 512">

  <style>
    .ink { stroke: #000000; }
    @media (prefers-color-scheme: dark) {
      .ink { stroke: #ffffff; }
    }
  </style>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- connectors: root -> intermediate squares / center child -->
    <g class="ink" stroke-width="16">
      <path d="M232 152 L144 189 L144 242" />
      <path d="M256 158 L256 388" />
      <path d="M280 152 L368 189 L368 242" />
      <path d="M144 322 L144 388" />
      <path d="M368 322 L368 388" />
    </g>
    <!-- intermediate level: black rounded-square outlines -->
    <g class="ink" stroke-width="14">
      <rect x="104" y="242" width="80" height="80" rx="18" />
      <rect x="328" y="242" width="80" height="80" rx="18" />
    </g>
    <!-- curly braces: hug the tree, bottoms just below the leaves -->
    <g class="ink" stroke-width="18">
      <path d="M100 58 Q52 58 52 80 L52 214 Q52 260 4 260 Q52 260 52 306 L52 441 Q52 463 100 463" />
      <path d="M412 58 Q460 58 460 80 L460 214 Q460 260 508 260 Q460 260 460 306 L460 441 Q460 463 412 463" />
    </g>
  </g>
  <!-- purple root node -->
  <rect x="206" y="58" width="100" height="100" rx="26" fill="#6264F0" />
  <!-- purple leaf children -->
  <g fill="#6264F0">
    <circle cx="144" cy="420" r="32" />
    <circle cx="256" cy="420" r="32" />
    <circle cx="368" cy="420" r="32" />
  </g>

</svg>
<text x="465" y="305" font-family="Jost" font-size="104" font-weight="600" fill="#111111">Meta</text>
<text x="465" y="425" font-family="Jost" font-size="104" font-weight="600" fill="#111111">Configurator</text>
</svg>
